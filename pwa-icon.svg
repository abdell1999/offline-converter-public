<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e293b" />
    </linearGradient>

    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#cbd5e1" />
    </linearGradient>

    <filter id="glowImage" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#38bdf8" flood-opacity="0.5"/>
    </filter>
    <filter id="glowVideo" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#a78bfa" flood-opacity="0.5"/>
    </filter>
    <filter id="glowAudio" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#f472b6" flood-opacity="0.5"/>
    </filter>
  </defs>

  <rect width="800" height="800" rx="180" fill="url(#bgGrad)" />

  <circle cx="400" cy="400" r="240" fill="none" stroke="#334155" stroke-width="6" stroke-dasharray="12 24" stroke-linecap="round"/>

  <text x="400" y="390" font-family="system-ui, -apple-system, sans-serif" font-size="110" font-weight="900" fill="url(#textGrad)" text-anchor="middle" letter-spacing="2">ABR</text>
  <text x="400" y="440" font-family="system-ui, -apple-system, sans-serif" font-size="26" font-weight="700" letter-spacing="8" fill="#38bdf8" text-anchor="middle">CONVERTER</text>

  <g transform="translate(305, 470)">
    <rect x="0" y="0" width="190" height="36" rx="18" fill="#0f172a" stroke="#475569" stroke-width="2"/>
    <circle cx="25" cy="18" r="6" fill="#10b981" />
    <text x="45" y="23" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#94a3b8" letter-spacing="1">LOCAL &amp; OFFLINE</text>
  </g>

  <g transform="translate(400, 160)" filter="url(#glowImage)">
    <circle cx="0" cy="0" r="48" fill="#0f172a" stroke="#38bdf8" stroke-width="6"/>
    <rect x="-24" y="-15" width="48" height="32" rx="4" fill="none" stroke="#38bdf8" stroke-width="4"/>
    <circle cx="-10" cy="-5" r="4" fill="#38bdf8"/>
    <polyline points="-24,11 -8,-4 5,8 12,1 24,13" fill="none" stroke="#38bdf8" stroke-width="4" stroke-linejoin="round"/>
  </g>

  <g transform="translate(608, 520)" filter="url(#glowVideo)">
    <circle cx="0" cy="0" r="48" fill="#0f172a" stroke="#a78bfa" stroke-width="6"/>
    <rect x="-24" y="-18" width="48" height="36" rx="6" fill="none" stroke="#a78bfa" stroke-width="4"/>
    <polygon points="-6,-8 -6,8 10,0" fill="#a78bfa"/>
  </g>

  <g transform="translate(192, 520)" filter="url(#glowAudio)">
    <circle cx="0" cy="0" r="48" fill="#0f172a" stroke="#f472b6" stroke-width="6"/>
    <path d="M-12,10 v-24 l26,-6 v24" fill="none" stroke="#f472b6" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="-16" cy="10" r="6" fill="#f472b6"/>
    <circle cx="10" cy="4" r="6" fill="#f472b6"/>
  </g>
  
  <circle cx="150" cy="150" r="3" fill="#475569" />
  <circle cx="650" cy="200" r="3" fill="#475569" />
  <circle cx="120" cy="650" r="3" fill="#475569" />
  <circle cx="700" cy="700" r="3" fill="#475569" />
</svg>
